<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spicy Blog</title>
    <meta name="description" content="A premium, modern blogging platform featuring sleek glassmorphism design, real-time liking, commenting, and creation of blogs.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=1.0.2">
</head>
<body>
    <!-- Toast Notifications Container -->
    <div id="toast-container" class="toast-container"></div>
    
    <!-- Navbar -->
    <header class="glass-nav">
        <div class="logo" id="logo-home">
            <svg class="logo-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
            </svg>
            <span class="logo-accent">Spicy</span>Blog
        </div>
        
        <nav class="nav-links" id="nav-links">
            <a href="#home" class="nav-link active" id="link-home">Home</a>
            <a href="#create" class="nav-link" id="link-create" style="display: none;">Create Post</a>
            <a href="#myblogs" class="nav-link" id="link-myblogs" style="display: none;">My Blogs</a>
        </nav>
        
        <div class="search-container" id="search-container" style="display: none;">
            <input type="text" id="search-input" placeholder="Search blogs by title...">
            <button id="search-btn" aria-label="Search">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
            </button>
        </div>

        <div class="auth-status" id="auth-status-container">
            <button id="nav-login-btn" class="btn btn-secondary">Login</button>
        </div>
    </header>

    <!-- App Main Shell -->
    <main class="container" id="app">
        <!-- Skeleton loaders or views injected dynamically -->
        <div class="skeleton-wrapper">
            <div class="skeleton-card"></div>
            <div class="skeleton-card"></div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <p>&copy; 2026 Spicy Blog. Designed for high performance and visual excellence.</p>
    </footer>

    <script src="app.js?v=1.0.2"></script>
</body>
</html>
