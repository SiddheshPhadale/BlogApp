services:
  # Database Service
  db:
    image: postgres:16-alpine
    container_name: blog-db
    env_file:
      - ./BlogApp/.env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d blogdb"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Backend API Service
  backend:
    build:
      context: ./BlogApp
      dockerfile: Dockerfile
    container_name: blog-backend
    ports:
      - "8080:8080"
    env_file:
      - ./BlogApp/.env
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # Frontend Static Web Server Service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: blog-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
