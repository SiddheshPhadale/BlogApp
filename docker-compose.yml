services:
  # Backend API Service
  backend:
    build:
      context: ./BlogApp
      dockerfile: Dockerfile
    container_name: blog-backend
    ports:
      - "8080:8080"
    env_file:
      - ./BlogApp/.env
    restart: unless-stopped

  # Frontend Static Web Server Service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: blog-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped